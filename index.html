<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SHAZAM">
<meta name="theme-color" content="#1A44C8">
<title>SHAZAM — Strength & Hypertrophy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root{
  --bg:#F0EFED; --surface:#FFFFFF; --surface2:#F5F4F2; --border:#E2E1DE;
  --accent:#1A44C8; --accent-deep:#0E2A8A; --ink:#0E1B3D;
  --bolt:#FFC72C; --bolt-deep:#F0A500;
  --text:#1A1A1A; --muted:#6B7280; --light:#9CA3AF;
  --green:#16A34A; --green-tint:#F0FDF4; --red:#EF4444; --red-tint:#FEF2F2;
  --tint:#EEF1FB;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom);}
.mono{font-family:'DM Mono',monospace;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(120deg,var(--ink),var(--accent) 140%);
  color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;}
.header::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(255,199,44,.18),transparent 70%);pointer-events:none;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;display:flex;align-items:center;gap:8px;line-height:1;}
.logo .bolt{color:var(--bolt);filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));font-size:26px;}
.hstat{text-align:right;}
.hstat-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;}
.hstat-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--bolt);letter-spacing:1px;}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:6px;background:var(--light);vertical-align:middle;}
.sync-dot.ok{background:var(--bolt);box-shadow:0 0 6px var(--bolt);} .sync-dot.off{background:#5A6B8C;}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;}
.nav-btn{flex:1;font-family:'DM Sans';font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  padding:13px 4px;background:none;border:none;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;}
.nav-btn.active{color:var(--accent);border-color:var(--bolt);}

.wrap{padding:18px 16px 90px;max-width:640px;margin:0 auto;}
.page{display:none;animation:fade .25s ease;} .page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(14,27,61,.04);animation:rise .3s ease backwards;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.title-xl{font-family:'Bebas Neue';font-size:34px;letter-spacing:1px;line-height:1;color:var(--ink);}
.title-l{font-family:'Bebas Neue';font-size:24px;letter-spacing:.5px;color:var(--ink);}
.sub{color:var(--muted);font-size:13px;margin-top:3px;}

/* DAY HERO */
.hero{background:linear-gradient(125deg,var(--ink),var(--accent));color:#fff;border:none;position:relative;overflow:hidden;}
.hero::before{content:"\26A1";position:absolute;right:-6px;bottom:-24px;font-size:120px;opacity:.10;line-height:1;}
.hero .eyebrow{color:var(--bolt);opacity:1;}
.hero .title-xl{color:#fff;}
.hero .sub{color:rgba(255,255,255,.8);}
.goal-in{width:130px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;border-radius:9px;text-align:center;padding:0 6px;}
.goal-in:focus{outline:none;border-color:var(--bolt);background:rgba(255,255,255,.22);}

/* BUTTONS */
.btn{display:block;width:100%;font-family:'DM Sans';font-weight:700;font-size:15px;letter-spacing:.5px;
  padding:15px;border-radius:12px;border:none;cursor:pointer;text-align:center;transition:transform .08s,filter .15s;}
.btn:active{transform:scale(.98);}
.btn-bolt{background:var(--bolt);color:var(--ink);text-transform:uppercase;box-shadow:0 3px 0 var(--bolt-deep);}
.btn-bolt:active{box-shadow:0 1px 0 var(--bolt-deep);transform:translateY(2px);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;display:inline-block;border-radius:9px;}
.btn-row{display:flex;gap:8px;}

/* EXERCISE CARD */
.ex{margin-bottom:14px;}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px;}
.ex-name{font-weight:700;font-size:16px;line-height:1.2;}
.ex-name.primary{color:var(--accent);}
.ex-target{font-size:12px;color:var(--muted);white-space:nowrap;}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 10px;font-size:11px;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--muted);}
.chip.full{background:var(--tint);color:var(--accent);border-color:#C9D5F0;}
.chip.short{background:#FFF7E0;color:var(--bolt-deep);border-color:#F4E2A8;}
.chip.safe{background:var(--red-tint);color:var(--red);border-color:#F8C9C9;}
.hint{background:var(--green-tint);border:1px solid #BBF7D0;color:#15803D;border-radius:9px;padding:7px 10px;font-size:12px;margin-bottom:10px;}
.hint.same{background:var(--surface2);border-color:var(--border);color:var(--muted);}
.hint.down{background:#FFF7E0;border-color:#F4E2A8;color:var(--bolt-deep);}
.prev{font-size:11px;color:var(--light);margin-bottom:8px;}

.wt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.wt-row label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
input[type=number]{font-family:'DM Mono';font-size:16px;width:84px;padding:9px;border:1.5px solid var(--border);border-radius:9px;text-align:center;background:var(--surface);}
input[type=number]:focus{outline:none;border-color:var(--accent);}
.plate{font-family:'DM Mono';font-size:11px;color:var(--muted);background:var(--surface2);border-radius:7px;padding:5px 9px;}

.sets{display:flex;flex-direction:column;gap:7px;}
.set{display:flex;align-items:center;gap:10px;}
.set-n{font-family:'Bebas Neue';font-size:18px;color:var(--light);width:18px;}
.set .reps{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.set .reps input{width:54px;padding:7px;font-size:14px;}
.check{margin-left:auto;width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:var(--surface);
  font-size:18px;color:transparent;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;}
.marks{margin-left:auto;display:flex;gap:6px;}
.setw{font-size:13px;color:var(--muted);min-width:44px;}
.ew{width:66px!important;}
.warm{background:#FFF7E0;border:1px solid #F4E2A8;border-radius:9px;padding:9px 11px;margin-bottom:10px;}
.warm-h{font-size:11px;font-weight:700;color:var(--bolt-deep);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.warm-s{display:inline-block;font-family:'DM Mono',monospace;font-size:12px;color:#7a5c12;background:#FFFBEC;border:1px solid #F4E2A8;border-radius:6px;padding:3px 7px;margin:2px 4px 2px 0;}
.mark{width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:var(--surface);
  font-size:16px;color:var(--light);cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;}
.mark.ok.on{background:var(--green);border-color:var(--green);color:#fff;}
.mark.no.on{background:var(--red);border-color:var(--red);color:#fff;}
.mark:active{transform:scale(.92);}
.ver{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0;color:var(--bolt);opacity:.85;font-weight:500;align-self:flex-start;margin:3px 0 0 2px;}

.rpe{display:flex;gap:6px;margin-top:12px;align-items:center;}
.rpe-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-right:2px;}
.rpe-b{flex:1;padding:8px 0;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:'DM Mono';font-size:13px;cursor:pointer;color:var(--muted);}
.rpe-b.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.last{font-size:12px;color:var(--muted);background:var(--surface2);border-radius:8px;padding:7px 10px;margin-bottom:10px;line-height:1.5;}
.last b{color:var(--ink);}
.effort{display:flex;gap:6px;margin-top:12px;align-items:center;}
.eff{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-weight:700;font-size:13px;cursor:pointer;color:var(--muted);}
.eff.easy.sel{background:var(--green);color:#fff;border-color:var(--green);}
.eff.ok.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.eff.hard.sel{background:var(--bolt-deep);color:#fff;border-color:var(--bolt-deep);}
.sticky{margin-top:12px;}
.sticky textarea{width:100%;min-height:46px;border:1px solid #F4E2A8;background:#FFFBEC;border-radius:9px;padding:9px 11px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:#5c4a12;resize:vertical;line-height:1.4;}
.sticky textarea::placeholder{color:#BCA968;}
.sticky textarea:focus{outline:none;border-color:var(--bolt-deep);}

/* REST TIMER */
.rest{position:fixed;left:0;right:0;bottom:0;z-index:200;background:var(--ink);color:#fff;
  padding:16px 20px calc(env(safe-area-inset-bottom) + 16px);display:none;align-items:center;justify-content:space-between;
  box-shadow:0 -4px 20px rgba(0,0,0,.25);animation:slideup .25s ease;}
.rest.on{display:flex;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.rest-time{font-family:'Bebas Neue';font-size:42px;color:var(--bolt);letter-spacing:2px;line-height:1;}
.rest-ctrl{display:flex;gap:8px;}
.rest-ctrl button{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:9px;padding:10px 13px;font-size:14px;font-weight:700;cursor:pointer;}
.rest-ctrl .x{background:var(--bolt);color:var(--ink);}

/* HISTORY */
.hist{padding:13px 14px;border-left:3px solid var(--accent);}
.hist .d{font-size:12px;color:var(--muted);}
.hist .n{font-weight:700;font-size:15px;}
.hist .stat{font-family:'DM Mono';font-size:12px;color:var(--muted);margin-top:3px;}

/* CHART */
.chart-wrap{overflow:hidden;border-radius:10px;}
svg{display:block;width:100%;}
.legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-top:8px;}
.legend i{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle;}

/* SETTINGS */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;}
.field .help{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
.field input[type=text],.field input[type=password],.field input.full{width:100%;font-family:'DM Sans';font-size:14px;
  padding:11px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);}
.field input:focus{outline:none;border-color:var(--accent);}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* TOAST */
.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:13px 20px;border-radius:11px;font-size:13px;font-weight:600;z-index:300;
  opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);} .toast.ok{background:var(--green);}

/* MODAL */
.modal{position:fixed;inset:0;z-index:250;background:rgba(14,27,61,.5);display:none;align-items:center;justify-content:center;padding:24px;}
.modal.on{display:flex;}
.modal-box{background:var(--surface);border-radius:16px;padding:22px;max-width:340px;width:100%;animation:rise .25s;}
.modal-box .title-l{margin-bottom:8px;}
.modal-box p{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5;}

.day-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
.day-b{padding:11px 12px;border:2px solid var(--border);border-radius:11px;background:var(--surface2);cursor:pointer;text-align:left;}
.day-b.sel{border-color:var(--accent);background:var(--tint);}
.day-b .dn{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.5px;color:var(--ink);line-height:1;}
.day-b.sel .dn{color:var(--accent);}
.day-b .dt{font-size:11px;color:var(--muted);margin-top:3px;}
.day-b .nx{font-size:9px;color:var(--bolt-deep);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;min-height:11px;}

/* PLATE CALC */
.pc-mode{display:flex;gap:10px;margin-bottom:16px;}
.pc-mode button{flex:1;padding:13px 10px;border-radius:11px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;line-height:1.25;text-align:center;}
.pc-mode button.sel{border-color:var(--accent);background:var(--tint);color:var(--accent);}
.pc-mode small{display:block;font-weight:400;font-size:10px;color:var(--muted);margin-top:3px;}
.pc-mode button.sel small{color:var(--accent);opacity:.8;}
.pc-wt{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0 2px;}
.pc-wt input{font-family:'DM Mono';font-size:26px;width:120px;text-align:center;padding:10px;border:1.5px solid var(--border);border-radius:11px;}
.pc-adj{display:flex;gap:6px;margin:12px 0;}
.pc-adj button{flex:1;padding:11px 0;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);font-family:'DM Mono';font-size:13px;font-weight:600;cursor:pointer;color:var(--text);}
.pc-adj button:active{background:var(--surface2);}
.pc-stack{display:flex;align-items:flex-end;justify-content:center;gap:3px;flex-wrap:wrap;min-height:90px;margin:18px 0 10px;}
.pc-plate{min-width:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'DM Mono';font-size:10px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.22);padding:0 3px;}
.pc-side{text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.pc-total{text-align:center;font-family:'Bebas Neue';font-size:34px;color:var(--ink);letter-spacing:1px;line-height:1;margin-top:6px;}
.pc-note{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;}
.pc-note.warn{color:var(--bolt-deep);}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="bolt">&#9889;</span>SHAZAM<span class="ver">v1.6</span></div>
  <div class="hstat">
    <div class="hstat-l">Est. Bench 1RM</div>
    <div class="hstat-v" id="h-1rm">—<span class="sync-dot off" id="sync-dot"></span></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-pg="today" onclick="showPage('today')">Today</button>
  <button class="nav-btn" data-pg="progress" onclick="showPage('progress')">Progress</button>
  <button class="nav-btn" data-pg="history" onclick="showPage('history')">History</button>
  <button class="nav-btn" data-pg="plates" onclick="showPage('plates')">Plates</button>
  <button class="nav-btn" data-pg="settings" onclick="showPage('settings')">Settings</button>
</div>

<div class="wrap">
  <div class="page active" id="page-today"></div>
  <div class="page" id="page-progress"></div>
  <div class="page" id="page-history"></div>
  <div class="page" id="page-plates"></div>
  <div class="page" id="page-settings"></div>
</div>

<div class="rest" id="rest">
  <div><div style="font-size:10px;letter-spacing:2px;opacity:.7;text-transform:uppercase;">Rest</div>
    <div class="rest-time mono" id="rest-time">2:00</div></div>
  <div class="rest-ctrl">
    <button onclick="adjustRest(-15)">−15</button>
    <button onclick="adjustRest(15)">+15</button>
    <button class="x" onclick="stopRest()">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modal-box">
  <div class="title-l" id="modal-t"></div><p id="modal-p"></p>
  <div class="btn-row"><button class="btn btn-ghost btn-sm" style="flex:1" onclick="closeModal()">Cancel</button>
  <button class="btn btn-primary btn-sm" style="flex:1" id="modal-ok">OK</button></div>
</div></div>

<script>
/* ============ PROGRAM (data-driven) ============ */
const PROGRAM = [
  { name:'Day 1', tag:'Bench Strength + Chest / Delts / Triceps', ex:[
    {n:'Barbell Bench Press',t:'barbell',s:4,lo:4,hi:6,rest:'full',prog:'micro',inc:1,primary:1},
    {n:'Incline Barbell / Smith Press',t:'barbell',s:3,lo:6,hi:10,rest:'full',inc:5},
    {n:'Hammer Strength Chest Press',t:'machine',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Pec Deck',t:'machine',s:2,lo:10,hi:12,rest:'short',inc:5},
    {n:'Cable Lateral Raise',t:'cable',s:3,lo:10,hi:12,rest:'short',inc:5},
    {n:'Rope Triceps Pushdown',t:'cable',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Cable Overhead Triceps Ext.',t:'cable',s:2,lo:8,hi:12,rest:'short',inc:5},
  ]},
  { name:'Day 2', tag:'Back Width + Arms', ex:[
    {n:'Neutral-Grip Lat Pulldown',t:'machine',s:4,lo:8,hi:12,rest:'full',inc:5},
    {n:'Chest-Supported Row',t:'machine',s:4,lo:6,hi:10,rest:'full',inc:5},
    {n:'One-Arm Cable Row',t:'cable',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Straight-Arm Pulldown',t:'cable',s:2,lo:10,hi:12,rest:'short',inc:5},
    {n:'Rear Delt Machine',t:'machine',s:3,lo:10,hi:12,rest:'short',inc:5},
    {n:'EZ-Bar / Cable Curl',t:'cable',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Hammer Curl',t:'dumbbell',s:2,lo:8,hi:12,rest:'short',inc:5},
  ]},
  { name:'Day 3', tag:'Lower (Back-Safe) + Shoulders', ex:[
    {n:'Hack Squat',t:'machine',s:4,lo:4,hi:6,rest:'full',prog:'big',inc:10,primary:1,
      note:'1\u20132 reps in reserve. No hips off the pad, no bounce. Kill the set if form slips.'},
    {n:'Seated / Lying Leg Curl',t:'machine',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Leg Extension',t:'machine',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Calf Raise',t:'machine',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Hammer Strength Shoulder Press',t:'machine',s:3,lo:6,hi:10,rest:'full',inc:5},
    {n:'Cable Lateral Raise',t:'cable',s:2,lo:10,hi:12,rest:'short',inc:5},
    {n:'Pallof / Dead Bug / Carry',t:'core',s:3,lo:10,hi:12,rest:'short',inc:0,
      note:'Anti-movement core \u2014 keep the spine neutral. No loaded crunches.'},
  ]},
  { name:'Day 4', tag:'Second Bench Exposure + Width / Arms', ex:[
    {n:'Barbell Bench Press',t:'barbell',s:3,lo:6,hi:10,rest:'full',inc:5,primary:1,
      note:'Lighter than Day 1 \u2014 a volume exposure, not a max effort.'},
    {n:'Lat Pulldown',t:'machine',s:3,lo:8,hi:12,rest:'full',inc:5},
    {n:'Machine / Chest-Supported Row',t:'machine',s:3,lo:8,hi:12,rest:'short',inc:5},
    {n:'Pec Deck',t:'machine',s:2,lo:10,hi:12,rest:'short',inc:5},
    {n:'Cable Lateral Raise',t:'cable',s:3,lo:10,hi:12,rest:'short',inc:5},
    {n:'Face Pull / Rear Delt',t:'cable',s:3,lo:10,hi:12,rest:'short',inc:5},

/* ============ HELPERS ============ */
function calc1RM(w,r){if(!w||!r)return 0;if(r==1)return w;return Math.round(w*(1+r/30));}
function plateBreakdown(weight,bar,smallest){
  let perSide=(weight-bar)/2; if(perSide<=0)return 'just the bar';
  const plates=[45,35,25,10,5,2.5,1,0.75,0.5].filter(p=>p>=smallest);
  let out=[]; for(const p of plates){let c=0;while(perSide+1e-6>=p){perSide-=p;c++;}if(c)out.push(c+'\u00d7'+p);}
  return out.length?out.join(' + ')+' /side':'just the bar';
}
function lastLogFor(name){for(let i=DATA.logs.length-1;i>=0;i--){const e=DATA.logs[i].ex.find(x=>x.n===name);if(e)return e;}return null;}
function roundLoad(w,x){
  if(x.t==='barbell'){const bar=DATA.settings.barWeight,inc=DATA.settings.smallestPlate*2;
    if(w<=bar)return bar;return bar+Math.round((w-bar)/inc)*inc;}
  return Math.round(w/5)*5; // machines/cables/dumbbells round to 5
}

}

    })};

function suggestWeight(x){
  if(x.t==='core'||x.inc===0)return{w:'',kind:'core',msg:''};
  const saved=DATA.weights[x.id];
  const p=DATA.plan[x.id];
  if(p){
    const m={
      up:`&#9889; Hit ${x.hi}+ on all sets \u2014 go up ${x.inc} lb to ${p.w}`,
      hold:`In range last time. Add reps toward ${x.hi}, then go up.`,
      hardhold:`You hit the reps but graded it Hard \u2014 stay at ${p.w} until it feels solid, then go up.`,
      retry:`Missed last time \u2014 same weight, try again before backing off.`,
      down:`Stalled twice \u2014 backed off to ${p.w} (~10%). Build back up.`
    };
    return{w:p.w,kind:p.kind,msg:m[p.kind]||''};
  }
  return{w:saved||'',kind:'start',msg:saved?'':'Set your starting weight'};
}
// classify a just-completed session exercise: success | hold | miss | skip
function classify(x){
  const touched=x.sets.filter(s=>s.status);
  if(touched.length===0)return'skip';
  const anyFail=x.sets.some(s=>s.status==='fail');           // a red X always counts as a stall
  const ok=x.sets.filter(s=>s.status==='done'&&+s.reps>0);
  if(!anyFail&&ok.length>=x.s&&ok.every(s=>+s.reps>=x.hi))return'success';
  if(!anyFail&&ok.length>=x.s&&ok.every(s=>+s.reps>=x.lo))return'hold';
  return'miss';
}
// update weight, fail streak, and next plan from a completed session exercise
function updateProgression(x){
  if(x.t==='core'||x.inc===0)return;
  let out=classify(x); if(out==='skip')return;
  let hardHold=false;
  if(out==='success'&&x.effort==='hard'){out='hold';hardHold=true;}   // hit reps but graded Hard -> don't graduate
  const w=Math.max(...x.sets.filter(s=>s.status&&+s.weight>0).map(s=>+s.weight),0);
  if(!w)return;
  DATA.weights[x.id]=w;
  let fs=DATA.failStreak[x.id]||0;
  if(out==='success'){DATA.plan[x.id]={w:roundLoad(w+x.inc,x),kind:'up'};fs=0;}
  else if(out==='hold'){DATA.plan[x.id]={w:w,kind:hardHold?'hardhold':'hold'};fs=0;}
  else{fs++;
    if(fs>=2){DATA.plan[x.id]={w:roundLoad(w*0.9,x),kind:'down'};fs=0;}
    else{DATA.plan[x.id]={w:w,kind:'retry'};}
  }
  DATA.failStreak[x.id]=fs;
}

// warm-up ramp to the working weight (barbell key lifts)
function buildWarmups(W,bar){
  if(!W||W<=bar)return[];
  const pct=[0,0.5,0.7,0.85,0.93],reps=[8,5,4,2,1],out=[];let prev=0;
  pct.forEach((p,i)=>{let w=i===0?bar:Math.round(W*p/5)*5;if(w<bar)w=bar;if(w>=W||w<=prev)return;out.push({w,r:reps[i]});prev=w;});
  return out;
}

}

function benchSeries(){const out=[];DATA.logs.forEach(l=>{const e=l.ex.find(x=>x.n==='Barbell Bench Press');
  if(e){let best=0;e.sets.forEach(s=>{if(s.status&&s.reps){const v=calc1RM(s.weight,s.reps);if(v>best)best=v;}});if(best)out.push({d:l.date,v:best});}});return out;}
function trendTxt(p){const diff=p[p.length-1].v-p[0].v;return(diff>=0?'+':'')+diff+' lb';}
function chartSVG(pts,goal){
  const W=560,H=200,pad=34;
  const vals=pts.map(p=>p.v).concat([goal]);
  let mn=Math.min(...vals)-10,mx=Math.max(...vals)+10;if(mx-mn<20){mn-=10;mx+=10;}
  const x=i=>pad+(pts.length<2?(W-2*pad)/2:i*(W-2*pad)/(pts.length-1));
  const y=v=>H-pad-(v-mn)/(mx-mn)*(H-2*pad);
  const gy=y(goal);
  const line=pts.map((p,i)=>(i?'L':'M')+x(i)+' '+y(p.v)).join(' ');
  const area=line+` L${x(pts.length-1)} ${H-pad} L${x(0)} ${H-pad} Z`;
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:200px">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1A44C8" stop-opacity=".22"/><stop offset="1" stop-color="#1A44C8" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pad}" y1="${gy}" x2="${W-pad}" y2="${gy}" stroke="#FFC72C" stroke-width="2" stroke-dasharray="5 4"/>
    <path d="${area}" fill="url(#g)"/>
    <path d="${line}" fill="none" stroke="#1A44C8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="4" fill="#fff" stroke="#1A44C8" stroke-width="2.5"/>`).join('')}
    <text x="${pad}" y="${H-10}" font-size="11" fill="#9CA3AF" font-family="DM Mono">${fmtD(pts[0].d)}</text>
    <text x="${W-pad}" y="${H-10}" font-size="11" fill="#9CA3AF" font-family="DM Mono" text-anchor="end">${fmtD(pts[pts.length-1].d)}</text>
  </svg></div>`;
}

            <span class="reps">reps <input type="number" inputmode="numeric" value="${st.reps||''}" onchange="editSet(${ei},${si},'reps',this.value)"></span>
            <div class="marks">
              <button class="mark ok ${st.status==='done'?'on':''}" onclick="editStatus(${ei},${si},'done')">&#10003;</button>
              <button class="mark no ${st.status==='fail'?'on':''}" onclick="editStatus(${ei},${si},'fail')">&#10007;</button>
            </div>
          </div>`).join('')}</div>
        <div class="effort"><span class="rpe-l">Felt</span>
          ${[['easy','Easy'],['ok','OK'],['hard','Hard']].map(([v,lb])=>`<button class="eff ${v} ${le.effort===v?'sel':''}" onclick="editEffort(${ei},'${v}')">${lb}</button>`).join('')}</div>
      </div>`;}).join('')}
    <button class="btn btn-bolt" onclick="closeEdit()">Done</button>
    <button class="btn btn-ghost" style="margin-top:10px;color:var(--red)" onclick="deleteSession(${idx})">Delete this workout</button>`;
}
function commitEdit(){recomputeProgression();save();if(ghReady())autoSync();updateHeader();}
function editSet(ei,si,field,v){const st=DATA.logs[EDIT].ex[ei].sets[si];st[field]=v?+v:0;commitEdit();}
function editStatus(ei,si,status){const st=DATA.logs[EDIT].ex[ei].sets[si];st.status=st.status===status?'':status;commitEdit();renderHistory();}
function editEffort(ei,e){const le=DATA.logs[EDIT].ex[ei];le.effort=le.effort===e?'':e;commitEdit();renderHistory();}
function deleteSession(idx){confirmModal('Delete this workout?','It will be removed and your progression recalculated.',()=>{DATA.logs.splice(idx,1);EDIT=null;recomputeProgression();save();if(ghReady())autoSync();closeModal();showPage('history');updateHeader();toast('Workout deleted','ok');});}
function exportCSV(){
  let rows=[['date','day','exercise','set','weight','reps','result','effort']];
  DATA.logs.forEach(l=>l.ex.forEach(x=>x.sets.forEach((s,i)=>{
    if(s.status)rows.push([l.date,l.name,x.n,i+1,s.weight,s.reps,s.status==='fail'?'fail':'done',x.effort||'']);
  })));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='shazam_export.csv';a.click();URL.revokeObjectURL(u);
  toast('CSV downloaded','ok');
}

/* ---- SETTINGS ---- */
function renderSettings(){
  const g=ghCfg();
  $('page-settings').innerHTML=`
    <div class="card"><div class="eyebrow" style="margin-bottom:14px;">Equipment</div>
      <div class="field"><label>Bar weight (lb)</label><input class="full" type="number" value="${DATA.settings.barWeight}" onchange="setSetting('barWeight',this.value)"></div>
      <div class="field"><label>Smallest plate per side (lb)</label><input class="full" type="number" step="0.25" value="${DATA.settings.smallestPlate}" onchange="setSetting('smallestPlate',this.value)">
        <div class="help">Set to 0.5 for your microplates \u2014 lets the bench climb in 1 lb jumps.</div></div>
      <div class="field"><label>Bench 1RM goal (lb)</label><input class="full" type="number" value="${DATA.settings.benchGoal}" onchange="setSetting('benchGoal',this.value)"></div>
    </div>
    <div class="card"><div class="eyebrow" style="margin-bottom:6px;">&#9889; GitHub Backup</div>
      <div class="help" style="margin-bottom:14px;">Auto-saves your data to your repo after every workout. The token is like a password \u2014 see setup notes.</div>
      <div class="field"><label>GitHub username</label><input class="full" type="text" id="gh-user" value="${g.user}" placeholder="billv1084-netizen"></div>
      <div class="field"><label>Repository name</label><input class="full" type="text" id="gh-repo" value="${g.repo}" placeholder="shazam"></div>
      <div class="field"><label>Access token</label><input class="full" type="password" id="gh-token" value="${g.token}" placeholder="github_pat_..."></div>
      <button class="btn btn-primary btn-sm" style="width:100%" onclick="saveGh()">Save backup settings</button>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="syncTo(true)">&#8593; Back up now</button>
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="syncFrom()">&#8595; Restore</button></div>
      <div class="help" style="margin-top:10px;" id="sync-line">${g.last?'Last backed up: '+new Date(g.last).toLocaleString():'Not backed up yet.'}</div>
    </div>
    <div class="card"><div class="eyebrow" style="margin-bottom:10px;">Data</div>
      <button class="btn btn-ghost btn-sm" style="width:100%;color:var(--red)" onclick="resetAll()">Reset all data</button>
    </div>`;
}
function setSetting(k,v){DATA.settings[k]=+v;save();toast('Saved');}
function resetAll(){confirmModal('Reset everything?','All logs and weights will be erased. This cannot be undone (unless you have a backup).',()=>{DATA=defaultData();save();closeModal();showPage('today');toast('Reset complete');});}

/* ---- GITHUB SYNC (mirrors IRON 300 flow) ---- */
function ghCfg(){return{token:localStorage.getItem('shz_token')||'',user:localStorage.getItem('shz_user')||'billv1084-netizen',repo:localStorage.getItem('shz_repo')||'shazam',last:localStorage.getItem('shz_last')||''};}
function ghReady(){const g=ghCfg();return!!(g.token&&g.user&&g.repo);}
function saveGh(){
  localStorage.setItem('shz_token',$('gh-token').value.trim());
  localStorage.setItem('shz_user',$('gh-user').value.trim());
  localStorage.setItem('shz_repo',$('gh-repo').value.trim());
  toast(ghReady()?'Backup settings saved':'Fill all three fields',ghReady()?'ok':'err');
  updateHeader();renderSettings();
}
async function syncTo(fb){
  const g=ghCfg();if(!ghReady()){toast('Set up backup first','err');return false;}
  try{
    const data=localStorage.getItem(KEY)||'{}';
    const content=btoa(Array.from(new TextEncoder().encode(data),b=>String.fromCharCode(b)).join(''));
    const url='https://api.github.com/repos/'+g.user+'/'+g.repo+'/contents/shazam_data.json';
    const h={'Authorization':'token '+g.token,'Accept':'application/vnd.github+json'};
    let sha=null;const gr=await fetch(url,{headers:h});if(gr.ok)sha=(await gr.json()).sha;
    const body={message:'shazam backup '+new Date().toISOString().slice(0,16).replace('T',' '),content};if(sha)body.sha=sha;
    const pr=await fetch(url,{method:'PUT',headers:{...h,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(pr.ok){localStorage.setItem('shz_last',new Date().toISOString());updateHeader();
      if(fb){toast('&#9889; Backed up','ok');renderSettings();}return true;}
    const er=await pr.json();if(fb)toast('Backup failed: '+(er.message||pr.status),'err');return false;
  }catch(e){if(fb)toast('Error: '+e.message,'err');return false;}
}
function autoSync(){syncTo(false);}
async function syncFrom(){
  const g=ghCfg();if(!ghReady()){toast('Set up backup first','err');return;}
  try{
    const url='https://api.github.com/repos/'+g.user+'/'+g.repo+'/contents/shazam_data.json';
    const r=await fetch(url,{headers:{'Authorization':'token '+g.token,'Accept':'application/vnd.github+json'}});
    if(!r.ok){toast('No backup found','err');return;}
    const j=await r.json();const txt=new TextDecoder().decode(Uint8Array.from(atob(j.content.replace(/\n/g,'')),c=>c.charCodeAt(0)));
    confirmModal('Restore from backup?','This replaces what is on your phone with the backed-up data.',()=>{
      localStorage.setItem(KEY,txt);DATA=load();closeModal();showPage('today');toast('Restored from backup','ok');});
  }catch(e){toast('Error: '+e.message,'err');}
}

/* ---- UI BITS ---- */
let toastT=null;
function toast(msg,kind){const t=$('toast');t.innerHTML=msg;t.className='toast show'+(kind?' '+kind:'');clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2200);}
let modalCb=null;
function confirmModal(title,body,cb){$('modal-t').textContent=title;$('modal-p').textContent=body;modalCb=cb;$('modal-ok').onclick=()=>modalCb&&modalCb();$('modal').classList.add('on');}
function closeModal(){$('modal').classList.remove('on');modalCb=null;}

/* ---- PLATE CALCULATOR ---- */
let pcMode='olympic';
const PC_COLORS={45:'#C0392B',35:'#2980B9',25:'#E0922A',10:'#27AE60',5:'#6B7785',2.5:'#A7AEB5',1:'#FFC72C',0.75:'#F0A500',0.5:'#9CA3AF'};
function pcSizes(){return [45,35,25,10,5,2.5,1,0.75,0.5].filter(p=>p>=(DATA.settings.smallestPlate||0.5));}
function pcPlates(total,barW){
  let side=(total-barW)/2; if(side<=0)return[];
  const out=[];for(const p of pcSizes()){let c=0;while(side+1e-6>=p){side-=p;c++;}if(c)out.push({w:p,c});side=Math.round(side*100)/100;}
  return out;
}
function renderPlates(){
  const start=DATA.weights['Barbell Bench Press']||135;
  $('page-plates').innerHTML=`
    <div class="card hero"><div class="eyebrow">Tool</div><div class="title-xl" style="color:#fff;">Plate Calculator</div>
      <div class="sub">What to load on each side</div></div>
    <div class="card">
      <div class="pc-mode">
        <button id="pc-oly" class="${pcMode==='olympic'?'sel':''}" onclick="pcSetMode('olympic')">&#9889; Olympic Bar<small>bar = ${DATA.settings.barWeight} lb</small></button>
        <button id="pc-mac" class="${pcMode==='machine'?'sel':''}" onclick="pcSetMode('machine')">&#128296; Plate-Loaded Machine<small>per side, no bar</small></button>
      </div>
      <div class="pc-wt"><input type="number" inputmode="decimal" id="pc-weight" value="${start}" oninput="pcCalc()"><span style="color:var(--muted)">lb total</span></div>
      <div class="pc-adj">
        <button onclick="pcAdjust(-5)">&minus;5</button><button onclick="pcAdjust(-1)">&minus;1</button>
        <button onclick="pcAdjust(1)">+1</button><button onclick="pcAdjust(5)">+5</button><button onclick="pcAdjust(45)">+45</button>
      </div>
      <div id="pc-result"></div>
    </div>
    <div class="card" style="font-size:12px;color:var(--muted);line-height:1.5;">
      <strong style="color:var(--text)">Olympic Bar</strong> subtracts the ${DATA.settings.barWeight} lb bar, then splits the rest evenly across both sides.<br>
      <strong style="color:var(--text)">Plate-Loaded Machine</strong> (hack squat, leg press, Hammer Strength) assumes the carriage is your zero \u2014 it just splits the number you enter across both sides.
    </div>`;
  pcCalc();
}
function pcSetMode(m){pcMode=m;document.getElementById('pc-oly').classList.toggle('sel',m==='olympic');document.getElementById('pc-mac').classList.toggle('sel',m==='machine');pcCalc();}
function pcAdjust(d){const i=$('pc-weight');i.value=Math.max(0,(parseFloat(i.value)||0)+d);pcCalc();}
function pcCalc(){
  const i=$('pc-weight'),r=$('pc-result');if(!i||!r)return;
  const total=parseFloat(i.value)||0;
  const barW=pcMode==='olympic'?DATA.settings.barWeight:0;
  if(total<=0){r.innerHTML='';return;}
  if(pcMode==='olympic'&&total<barW){r.innerHTML=`<div class="pc-note warn">That's less than the ${barW} lb bar.</div>`;return;}
  const plates=pcPlates(total,barW);
  const perSide=plates.reduce((s,p)=>s+p.c*p.w,0);
  const achievable=barW+perSide*2;
  const exact=Math.abs(achievable-total)<0.05;
  const chips=plates.length?plates.flatMap(p=>Array(p.c).fill(p.w)).map(w=>{
    const h=34+(w/45)*52;return`<div class="pc-plate" style="height:${h}px;background:${PC_COLORS[w]||'#888'};${w<5?'color:#1A1A1A;':''}">${w}</div>`;}).join(''):'';
  r.innerHTML=`
    <div class="pc-side">Each side &bull; ${perSide} lb</div>
    <div class="pc-stack">${pcMode==='olympic'?`<div class="pc-plate" style="height:24px;width:46px;background:var(--ink);">BAR</div>`:''}${chips||'<span style="color:var(--muted);font-size:13px">just the '+(pcMode==='olympic'?'bar':'carriage')+'</span>'}</div>
    <div class="pc-total">${achievable} lb total</div>
    ${exact?'':`<div class="pc-note warn">Closest loadable: ${achievable} lb (you entered ${total}).</div>`}
    <div class="pc-note">${plates.length?plates.map(p=>p.c+'\u00d7'+p.w).join(' + ')+' per side':''}</div>`;
}

/* ---- INIT ---- */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
// recover a live workout if iOS reloaded us from the background
try{const pend=localStorage.getItem('shazam_pending');if(pend){const p=JSON.parse(pend);if(p&&p.ex)SESSION=p;}}catch(e){}
renderToday();updateHeader();
</script>
